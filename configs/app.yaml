# Offline Multi-Tenant Face Recognition - local config
# Paths are resolved relative to the project root unless absolute.

storage:
  data_dir: data            # tenants/, events/, snapshots/, vision.db live here
  db_file: vision.db        # SQLite file inside data_dir

recognition:
  # ONNX model files (relative to project root). Fetch via scripts/download_models.py.
  detector_model: models/face_detection_yunet_2023mar.onnx   # OpenCV YuNet
  recognition_model: models/w600k_r50.onnx                   # ArcFace, 512-d
  providers:
    - CPUExecutionProvider
  # YuNet detector input size for Path A (recognition worker). Larger = more accurate, slower.
  det_size: [640, 640]
  # YuNet detector input size for Path B (live stream preview). Smaller = faster, sufficient for preview.
  # Fix 2: stream uses 320x320 to halve YuNet inference time vs the worker's 640x640.
  stream_det_size: [320, 320]
  # YuNet detection confidence threshold (0..1).
  det_thresh: 0.6
  # YuNet non-max-suppression threshold.
  nms_thresh: 0.3
  # Cosine-similarity threshold for a positive ArcFace identity match (0..1).
  match_threshold: 0.38
  # Whether to log faces that match nobody as "unknown" events.
  log_unknowns: false

stream:
  # Target recognition FPS per stream (frames are sampled down to this rate).
  target_fps: 2.0
  # Seconds to wait before reconnecting after a read failure.
  reconnect_delay: 3.0
  # Max consecutive failed reads before forcing a reconnect.
  max_read_failures: 30
  # Bound RTSP open/read blocking (ms) so dead cameras fail fast and shutdown is responsive.
  open_timeout_ms: 5000
  read_timeout_ms: 5000

auth:
  # IMPORTANT: override in production via the VISION_SECRET_KEY environment variable.
  # The value below is for local development only.
  secret_key: "dev-only-change-me"
  algorithm: HS256
  access_token_expire_minutes: 720  # 12 hours

ppe:
  # Path to YOLOv8n PPE ONNX model (relative to project root).
  # Export from best.pt: from ultralytics import YOLO; YOLO('best.pt').export(format='onnx')
  model: models/ppe_yolov8n.onnx
  enabled: true
  # Minimum detection confidence to count a PPE item as present (0..1).
  conf_threshold: 0.4
  # NMS IoU threshold.
  nms_threshold: 0.45
  # YOLO output class names in index order — must match your model's training classes.
  class_names:
    - gloves
    - vest
    - goggles
    - helmet
    - mask
    - safety_shoe
  providers:
    - CPUExecutionProvider
  # Which PPE classes to enforce is now controlled per-tenant via the Features
  # toggles in the UI — no config change needed to add/remove checked items.

loading:
  # YOLO-World model for open-vocabulary object detection.
  # ultralytics auto-downloads on first use (~100 MB, requires internet on first start).
  # Options: yolov8s-worldv2.pt (fastest), yolov8m-worldv2.pt (better accuracy on GPU)
  model: models/yolov8s-worldv2.pt
  enabled: true
  # Minimum detection confidence (lower = more detections, more noise).
  conf_threshold: 0.25
  iou_threshold: 0.45
  # "cuda" for NVIDIA GPU, "cpu" to force CPU, "auto" lets ultralytics pick.
  device: cuda
  # How often (seconds) the worker re-reads the loading config from DB.
  refresh_interval: 30.0
  # How often (seconds) the worker writes updated counts to disk.
  counts_write_interval: 2.0
  # Count +1 once a tracked object's ID has been missing for this many frames.
  # The whole camera view is the exit/truck zone. Raise to 15-20 if the camera
  # has blur/occlusion that briefly drops tracks and causes early counts.
  missing_frame_threshold: 10
  # A track must be visible for at least this many frames before it can count.
  # Raise it (e.g. 8-15) if a flickery stream still produces phantom counts.
  min_visible_frames: 5
  # Custom ByteTrack config (bigger track_buffer => stable IDs => less inflation).
  tracker: configs/trackers/bytetrack_loading.yaml

worker:
  # One OS process per this many cameras (Phase 4 scaling). Tune to CPU/GPU.
  cameras_per_process: 4
  # Batch event DB writes to reduce SQLite write contention.
  event_batch_size: 20
  event_batch_interval_sec: 2.0
  # Watchdog: restart a worker process that dies or stops heartbeating.
  heartbeat_interval_sec: 5.0
  heartbeat_timeout_sec: 30.0
  watchdog_poll_sec: 2.0
  restart_backoff_sec: 5.0

